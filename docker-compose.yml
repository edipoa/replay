services:
  replay-agent:
    build:
      context: .
      # Match the CPU architecture of your edge device:
      #   arm64  → Raspberry Pi 4 / 5, Jetson Nano
      #   amd64  → NUC, generic mini PC
      args:
        TARGETARCH: arm64

    image: replay-agent:latest

    restart: unless-stopped

    # ── Environment ─────────────────────────────────────────────────────────
    # Secrets and per-site settings live in a .env file (never commit it).
    # Copy .env.example → .env and fill in the values.
    env_file:
      - .env
    environment:
      # Paths inside the container — must match the volume targets below.
      REPLAY_BUFFER_DIR:  /tmp/replay_buffer
      REPLAY_OUTPUT_DIR:  /tmp/replays
      REPLAY_AGENDA_PATH: /etc/replay/agenda.json

    # ── Volumes ──────────────────────────────────────────────────────────────
    volumes:
      # Rolling segment buffer — tmpfs so segments never hit the SSD.
      # The video engine enforces 60 s retention; tmpfs adds a hardware-level
      # safety net and gives the fastest possible I/O for FFmpeg segment writes.
      - type: tmpfs
        target: /tmp/replay_buffer
        tmpfs:
          size: 524288000   # 500 MiB ≈ 4 min of 1080p @ 500 kbps

      # Finished .mp4 replays persisted on the host so they survive restarts
      # and can be inspected or re-uploaded manually.
      - replay_output:/tmp/replays

      # Schedule file: read-only mount so it can be updated on the host
      # (changes take effect on the next button press, no rebuild needed).
      - ./agenda.json:/etc/replay/agenda.json:ro

      # ── sysfs GPIO (portable, works alongside or instead of /dev/gpiomem) ──
      # periph.io's sysfs driver uses these to enumerate and drive GPIO pins.
      - /sys/class/gpio:/sys/class/gpio
      - /sys/devices/platform:/sys/devices/platform

    # ── GPIO devices ─────────────────────────────────────────────────────────
    # periph.io supports two Linux GPIO backends at runtime; we enable both:
    #   bcm283x  — memory-mapped, fastest, Raspberry Pi only → /dev/gpiomem
    #   sysfs    — generic kernel interface            → /sys (volumes above)
    devices:
      - /dev/gpiomem:/dev/gpiomem

    # Add the host's "gpio" group so the process can open /dev/gpiomem without
    # running as root.  On Raspberry Pi OS: `getent group gpio` → GID 997.
    # Adjust if your distro uses a different GID.
    group_add:
      - "997"

    # ── Logging ──────────────────────────────────────────────────────────────
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

# ── Top-level named volumes ───────────────────────────────────────────────────
volumes:
  replay_output:
    # Stored under /var/lib/docker/volumes/replay_output/_data on the host.
    # To list finished clips:
    #   docker run --rm -v replay_output:/out alpine ls -lh /out
